<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <title>Document</title>
</head>
<body>

<style>
  .bootstrap{
    height: 50px;
    width: 120px;
    margin-right: 8px;
    border-radius: 5px;

    color: white;
    background-color: rgb(121, 82, 179);
    border: none;
    font-size: 17px;
    font-weight: bold;
    transition: background-color 0.15s,
      color 0.15s;
  }

  .bootstrap:hover {
    background-color: black;
    color: yellow;

  }

  .download {
    height: 50px;
    width: 120px;
    border-radius: 5px;


    font-size: 17px;
    font-weight: bold;
    color: rgb(108, 117, 125);
    border-color: rgb(108, 117, 125);
    transition: background-color .15s,
      color 0.15s;

  }

  .download:hover {
    background-color: black;
    color: yellow;
  }
</style>

<button class="bootstrap"

        type="button"
>
  Get started
</button>

<button class="download"

        type="button"
>
  Download
</button>

</body>
</html>
