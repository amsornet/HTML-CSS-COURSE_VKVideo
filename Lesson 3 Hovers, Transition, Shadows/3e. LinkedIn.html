<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <title>Document</title>
</head>
<body>

<style>
  .website {

    height: 50px;
    width: 250px;
    margin-right: 8px;

    color: white;
    background-color: rgb(10, 102, 194);
    border-color: black;
    border-radius: 20px;
    font-size: 15px;
    font-weight: bold;
    transition: background-color .15s,
      border-width .15s;
  }
  .website:hover {
    background-color: green;
    border-width: 7px;

  }

  .save {
    height: 50px;
    width: 120px;
    margin-right: 8px;

    color: rgb(10, 102, 194);
    border-color: rgb(10, 102, 194);
    background-color: transparent;

    border-radius: 25px;
    font-size: 19px;
    font-weight: bold;
    transition: background-color .15s,
      border-width .15s;
  }

  .save:hover {
    background-color: yellow;
    border-width: 7px;
  }

</style>

<button class="website"

        type="button"
>
  Apply on company website
</button>

<button class="save"

        type="button"
>
  Save
</button>

</body>
</html>
