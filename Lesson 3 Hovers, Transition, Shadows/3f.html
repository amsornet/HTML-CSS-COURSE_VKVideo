<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <title>Document</title>
</head>
<body>

<style>

  .link {
    color: rgb(0, 113, 133);
    cursor: pointer;
    transition: color .15s;
  }
  .link:hover {
    color: orange;
  }

  .p_paragraph {
    font-weight: bold;
    font-size: 26px;

  }

  .stock {
    color: rgb(0, 118, 0);
    font-weight: bold;
  }

  .cart {
    height: 50px;
    width: 120px;
    margin-right: 8px;

    background-color: rgb(255, 216, 20);
    border-radius: 8px;
    border: none;
    font-size: 17px;
    transition: background-color .15s;
  }

  .cart:active {
    background-color: white;
  }

  .buy {
    height: 50px;
    width: 120px;


    background-color: rgb(255, 164, 20);
    border-radius: 8px;
    border: none;
    font-size: 17px;
    transition: background-color .15s;
  }
  .buy:active {
    background-color: yellowgreen;
  }

</style>

<a class="link" href="http://amazon.com">Back to Amazon</a>
<p></p>
<p class="p_paragraph">Nike Black Running Shoes</p>
<p></p>
<p class="stock">$39 - in Stock</p>
<p></p>
<p>Free delivery tomorrow.</p>
<button class="cart"

        type="button"
>
  Add to Cart
</button>

<button class="buy"

        type="button"
>
  Buy now
</button>

</body>
</html>
