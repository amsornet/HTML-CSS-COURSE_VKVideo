<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <title>Document</title>
</head>
<body>

<style>
  .subscribe-button {
    margin-right: 8px;
    background-color: rgb(204, 0, 0);
    color: white;
    border: none;
    height: 36px;
    width: 105px;
    border-radius: 2px;
    cursor: pointer;
    text-transform: uppercase;

  }
  .join-button {
    height: 36px;
    width: 62px;
    border-radius: 2px;
    margin-right: 8px;
    background-color: white;
    border-color: rgb(41, 118, 211);
    border-style: solid;
    border-width: 2px;
    color: rgb(41, 118, 211);
    cursor: pointer;
  }
  .tweet-button {
    height: 36px;
    width: 70px;
    background-color: rgb(29, 155, 240);
    border: none;
    color: white;
    border-radius: 5px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;

  }
</style>

<button class="subscribe-button"

  type="button"
>
  subscribe
</button>

<button class="join-button"

  type="button"
>
  JOIN
</button>

<button class="tweet-button"

  type="button"
>
  Tweet
</button>

</body>
</html>
